name: Daily Sync Upstream & Build Docker

on:
  # 每天 UTC 2:00 自动运行
  schedule:
    - cron: '0 2 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ===== Job 1: 检查上游是否有更新 =====
  check:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}

    steps:
      # 检出你自己的 Fork
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # 检查上游是否有更新
      - name: Check upstream updates
        id: check
        run: |
          # 添加上游 remote
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

          # 计算上游比本地多了多少提交
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Upstream is $BEHIND commits ahead"

          if [ "$BEHIND" -eq 0 ]; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

  # ===== Job 2: 有更新才执行构建 =====
  build:
    needs: check
    if: needs.check.outputs.updated == 'true'
    runs-on: ubuntu-latest

    steps:
      # 再次检出代码
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # 设置上游 remote
      - name: Setup upstream remote
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      # 同步上游代码到 main 分支
      - name: Sync with upstream
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout main
          git merge --ff-only upstream/main
          git push origin main

      # 生成 Docker 版本号
      - name: Generate version tag
        id: version
        run: |
          # 从 web/package.json 读取版本号
          VERSION=$(jq -r '.version' web/package.json)
          BASE_VERSION=${VERSION%-beta}
          # 获取上游 commit 短 SHA
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          FULL_VERSION="${BASE_VERSION}-${UPSTREAM_SHA}"
          echo "Version: $FULL_VERSION"
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT

      # 输出信息，方便在 Actions 日志看到
      - name: Show version info
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Docker image with version tag: ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}"
          echo "Docker image with latest tag: ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest"

      # 提取 Docker 元数据（tags、labels）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      # 设置 Docker Buildx，用于构建多平台镜像（可选）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      # 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 清理所有未打 tag 的镜像
      - name: Delete all untagged images
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const packageName = 'litepan-unofficial';

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: 'container',
                package_name: packageName,
                username: owner,
                per_page: 100
              }
            );

            for (const version of versions) {
              const tags = version.metadata?.container?.tags || [];

              if (tags.length === 0) {
                console.log(`Deleting untagged version ${version.id}`);
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: packageName,
                  username: owner,
                  package_version_id: version.id
                });
              }
            }
