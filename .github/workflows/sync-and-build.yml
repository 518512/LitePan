name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Sync with upstream
        id: sync
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream --tags
          
          git checkout main
          git merge upstream/main --no-edit || echo "Already up to date"
          
          git push origin main
          
          # 获取上游最新 tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest
            ghcr.io/\( {{ github.repository_owner }}/litepan-unofficial: \){{ steps.sync.outputs.latest_tag }}
            ghcr.io/\( {{ github.repository_owner }}/litepan-unofficial: \){{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
