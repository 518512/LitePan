name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      # 拉取 Fork 仓库
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # 检查上游是否有更新
      - name: Check upstream updates
        id: check
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true

          git fetch upstream main --tags

          LOCAL_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse upstream/main)

          echo "Local SHA: $LOCAL_SHA"
          echo "Upstream SHA: $UPSTREAM_SHA"

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "No updates found."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "Updates found."
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      # 同步上游
      - name: Sync with upstream
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git fetch upstream --prune --tags

          git checkout main

          # 快进同步
          git merge --ff-only upstream/main

          git push origin main

      # 生成版本号
      - name: Generate version tag
        if: steps.check.outputs.updated == 'true'
        id: version
        run: |
          VERSION=$(jq -r '.version' web/package.json)

          # 去除 beta 后缀
          BASE_VERSION=${VERSION%-beta}

          # 获取上游 Commit SHA
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)

          FULL_VERSION="${BASE_VERSION}-${UPSTREAM_SHA}"

          echo "Version: $FULL_VERSION"

          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT

      # Docker Metadata
      - name: Extract metadata
        if: steps.check.outputs.updated == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      # Buildx
      - name: Set up Docker Buildx
        if: steps.check.outputs.updated == 'true'
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: Login to GHCR
        if: steps.check.outputs.updated == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      # 构建并推送
      - name: Build and push
        if: steps.check.outputs.updated == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 输出结果
      - name: Show image info
        if: steps.check.outputs.updated == 'true'
        run: |
          echo "Image Tags:"
          echo "latest"
          echo "${{ steps.version.outputs.version }}"
