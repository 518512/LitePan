name: Daily Sync Upstream & Build Docker

on:
  schedule:
    # 每天 UTC 02:00 执行
    - cron: '0 2 * * *'

  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 拉取 Fork 仓库
      # =========================
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # =========================
      # 同步上游仓库
      # =========================
      - name: Sync with upstream
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # 添加上游仓库（已存在则忽略）
          git remote add upstream https://github.com/Ponphil/LitePan.git || true

          # 获取最新代码和所有 Tag
          git fetch upstream --prune --tags

          # 切换主分支
          git checkout main

          # 快进同步
          git merge --ff-only upstream/main

          # 推送到自己的 Fork
          git push origin main

      # =========================
      # 生成版本号
      #
      # 示例：
      #   0.8.4
      #   0.8.4-dev.1
      #   0.8.4-dev.5
      # =========================
      - name: Generate version tag
        id: version
        shell: bash
        run: |
          TAG=$(git describe --tags --abbrev=0)

          COUNT=$(git rev-list ${TAG}..HEAD --count)

          if [ "$COUNT" -eq 0 ]; then
            VERSION="$TAG"
          else
            VERSION="${TAG}-dev.${COUNT}"
          fi

          echo "Detected version: $VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # =========================
      # Docker Metadata
      # =========================
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial

          tags: |
            # 永远保留 latest
            type=raw,value=latest

            # Release / Dev 版本
            type=raw,value=${{ steps.version.outputs.version }}

            # Commit SHA
            type=sha

      # =========================
      # Buildx
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # 登录 GHCR
      # =========================
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      # =========================
      # 构建并推送镜像
      # =========================
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .

          push: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # 输出最终镜像标签
      # =========================
      - name: Show generated tags
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo ""
          echo "Images:"
          echo "  ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest"
          echo "  ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}"
