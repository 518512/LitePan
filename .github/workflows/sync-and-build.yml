name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# ⚡ 强制 JS Actions 使用 Node 24（可选优化项）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:

# =========================
# JOB 1：检查上游是否更新
# =========================
  check:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}

    steps:
      # 拉取 fork 仓库代码（完整历史用于对比）
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # 添加 upstream 源
      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      # 判断 upstream 是否有更新
      - name: Check upstream updates
        id: check
        run: |
          set -e

          # HEAD 与 upstream/main 的提交差异数量
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Upstream ahead commits: $BEHIND"

          if [ "$BEHIND" -eq 0 ]; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      # 输出检查结果（GitHub UI summary）
      - name: Check summary
        run: |
          if [ "${{ steps.check.outputs.updated }}" = "true" ]; then
            echo "🔔 检测到上游更新，将进入构建流程" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 上游无更新，本次流程结束" >> $GITHUB_STEP_SUMMARY
          fi


# =========================
# JOB 2：同步 + 构建 + 清理
# =========================
  build:
    needs: check
    if: needs.check.outputs.updated == 'true'
    runs-on: ubuntu-latest

    steps:

      # 拉取代码
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # 拉取 upstream
      - name: Setup upstream
        run: |
          git remote get-url upstream >/dev/null 2>&1 || \
          git remote add upstream https://github.com/Ponphil/LitePan.git
          git fetch upstream main --tags

      # =========================
      # 同步上游（安全模式，不强制覆盖 fork 历史）
      # =========================
      - name: Sync upstream
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git checkout main
          git merge --ff-only upstream/main || true
          git push origin main || true

      # =========================
      # 版本生成核心逻辑（重点）
      # =========================
      - name: Generate version tag
        id: version
        run: |
          set -e

          # 读取 upstream package.json 版本（如 0.3.1）
          VERSION=$(jq -r '.version' web/package.json)

          # 当前与 upstream commit
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          LOCAL_SHA=$(git rev-parse --short HEAD)

          echo "base version: $VERSION"
          echo "upstream sha: $UPSTREAM_SHA"
          echo "local sha: $LOCAL_SHA"

          # =========================
          # 默认状态：beta
          # =========================
          TAG="${VERSION}-beta"

          # =========================
          # 如果发生偏离 → 自动升级 patch + dev
          # =========================
          if [ "$LOCAL_SHA" != "$UPSTREAM_SHA" ]; then

            # 拆解版本号：0.3.1
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            # patch +1（你的核心规则）
            PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            # dev tag
            TAG="${NEXT_VERSION}-dev-${LOCAL_SHA}"
          fi

          echo "final tag: $TAG"

          # 输出给后续 step
          echo "version=$TAG" >> $GITHUB_OUTPUT

      # =========================
      # Build 信息展示
      # =========================
      - name: Build summary
        run: |
          echo "## 🐳 LitePan Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest" >> $GITHUB_STEP_SUMMARY

      # =========================
      # Docker metadata
      # =========================
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # 清理 GHCR（防止无 tag 镜像堆积）
      # =========================
      - name: Cleanup GHCR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const packageName = 'litepan-unofficial';

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: 'container',
                package_name: packageName,
                username: owner,
                per_page: 100
              }
            );

            for (const v of versions) {
              const tags = v.metadata?.container?.tags || [];

              // 只清理“完全没有 tag”的版本（避免误删 latest / 正在用版本）
              if (!tags || tags.length === 0) {

                console.log("delete untagged:", v.id);

                await github.rest.packages.deletePackageVersionForUser({
                  package_type: "container",
                  package_name: packageName,
                  username: owner,
                  package_version_id: v.id
                });
              }
            }
