name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      # 拉取 Fork 仓库
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # 同步上游仓库
      - name: Sync with upstream
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git remote add upstream https://github.com/Ponphil/LitePan.git || true

          # 获取最新代码和标签
          git fetch upstream --prune --tags

          git checkout main

          # 合并上游主分支
          git merge upstream/main --no-edit || echo "Already up to date"

          # 推送到 Fork
          git push origin main

      # 从 web/package.json 读取版本号
      - name: Generate version tag
        id: version
        run: |
          VERSION=$(jq -r '.version' web/package.json)

          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 生成 Docker Metadata
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      # 启用 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      # 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 输出信息
      - name: Show version info
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}"
          echo "ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest"
