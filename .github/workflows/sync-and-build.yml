name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# ⚡ 强制 JS Actions 使用 Node.js 24（避免 Node20 deprecated warning）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:

  # =========================
  # JOB 1: 检查上游是否更新
  # =========================
  check:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      - name: Check upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Upstream ahead commits: $BEHIND"

          if [ "$BEHIND" -eq 0 ]; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Check summary
        run: |
          if [ "${{ steps.check.outputs.updated }}" = "true" ]; then
            echo "🔔 上游有更新，将执行同步与构建" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 上游无更新，本次跳过构建" >> $GITHUB_STEP_SUMMARY
          fi


  # =========================
  # JOB 2: 同步 + 构建 Docker
  # =========================
  build:
    needs: check
    if: needs.check.outputs.updated == 'true'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup upstream
        run: |
          git remote get-url upstream >/dev/null 2>&1 || \
          git remote add upstream https://github.com/Ponphil/LitePan.git
          git fetch upstream main --tags

      # =========================
      # 同步上游（强制对齐版本）
      # =========================
      - name: Sync upstream (hard reset)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git checkout main
          git reset --hard upstream/main
          git push origin main --force

      # =========================
      # 版本生成逻辑（核心）
      # =========================
      - name: Generate version tag
        id: version
        run: |
          set -e

          VERSION=$(jq -r '.version' web/package.json)
          SHA=$(git rev-parse --short HEAD)

          echo "base version: $VERSION"
          echo "commit sha: $SHA"

          # =========================
          # 规则说明：
          # 1. 0.3.x 全部当 beta
          # 2. 在 beta 基础上加 dev-sha（如果代码变化）
          # =========================

          TAG="${VERSION}-beta"

          UPSTREAM_SHA=$(git rev-parse --short upstream/main)

          if [ "$SHA" != "$UPSTREAM_SHA" ]; then
            TAG="${TAG}-dev-${SHA}"
          fi

          echo "final tag: $TAG"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      # =========================
      # Build Summary
      # =========================
      - name: Build summary
        run: |
          echo "## 🐳 LitePan Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: latest" >> $GITHUB_STEP_SUMMARY

      # =========================
      # Docker metadata
      # =========================
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # 清理 untagged 镜像
      # =========================
      - name: Cleanup untagged images
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const packageName = 'litepan-unofficial';

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: 'container',
                package_name: packageName,
                username: owner,
                per_page: 100
              }
            );

            for (const v of versions) {
              const tags = v.metadata?.container?.tags || [];
              if (!tags || tags.length === 0) {
                console.log("delete untagged:", v.id);
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: packageName,
                  username: owner,
                  package_version_id: v.id
                });
              }
            }
