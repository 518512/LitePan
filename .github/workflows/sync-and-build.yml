name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream --tags
          
          git checkout main
          git merge upstream/main --no-edit || echo "Already up to date"
          
          git push origin main

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/litepan-unofficial
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value={{git_describe}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}     # ← 已统一使用 GH_PAT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
