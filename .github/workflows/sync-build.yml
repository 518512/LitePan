name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建（忽略 upstream 更新）"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: write

jobs:
# =========================
# 1️⃣ 检查 upstream 是否有更新
# =========================
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5        # ← 已更新
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      - name: Check upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "BEHIND=$BEHIND"
          if [ "$BEHIND" -gt 0 ] || [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

# =========================
# 2️⃣ 同步 + 构建 + 推送
# =========================
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5        # ← 已更新
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup upstream & Sync
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags
          git checkout main
          git merge upstream/main --no-edit || echo "Already up to date"
          git push origin main

      # =========================
      # 读取 package.json 版本号
      # =========================
      - name: Generate version
        id: version
        run: |
          set -e
          
          PKG_VERSION=$(jq -r '.version' web/package.json)
          echo "PKG_VERSION from package.json: $PKG_VERSION"
          
          BASE_VERSION=$(echo "$PKG_VERSION" | sed -E 's/[-[:space:]]*[Bb]eta.*$//i' | sed -E 's/^v//')
          echo "BASE_VERSION cleaned: $BASE_VERSION"
          
          CURRENT_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(echo "$CURRENT_SHA" | cut -c1-7)
          
          if [[ "$PKG_VERSION" == *-[Bb]eta* ]]; then
            VERSION="${BASE_VERSION}-Beta"
            MODE="beta"
          else
            VERSION="${BASE_VERSION}-Dev"
            MODE="dev"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dev_version=${BASE_VERSION}-Dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      # =========================
      # build summary
      # =========================
      - name: Build summary
        run: |
          echo "## 🐳 Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: ${{ steps.version.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dev with SHA: ${{ steps.version.outputs.dev_version }}" >> $GITHUB_STEP_SUMMARY

      # =========================
      # Docker 构建 & 推送
      # =========================
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.dev_version }}
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:dev

      # =========================
      # ⭐ latest 只在 Beta 版本时更新
      # =========================
      - name: Update latest tag (ONLY beta)
        if: steps.version.outputs.mode == 'beta'
        run: |
          docker buildx imagetools create \
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest

      # =========================
      # 清理未打 tag 的镜像
      # =========================
      - name: Cleanup GHCR untagged images
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const packageName = "litepan-unofficial";
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              { package_type: "container", package_name: packageName, username: owner, per_page: 100 }
            );
            for (const v of versions) {
              const tags = v.metadata?.container?.tags || [];
              if (tags.length === 0) {
                console.log("Deleting untagged version:", v.id);
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: "container",
                  package_name: packageName,
                  username: owner,
                  package_version_id: v.id
                });
              }
            }
