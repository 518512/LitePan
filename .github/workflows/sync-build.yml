name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建"
        type: boolean
        required: false
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:

# =========================
# 1️⃣ CHECK
# =========================
  check:
    runs-on: ubuntu-latest

    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      force: ${{ github.event.inputs.force_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      - name: Check updates
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "BEHIND=$BEHIND"

          if [ "$BEHIND" -gt 0 ] || [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi


# =========================
# 2️⃣ BUILD
# =========================
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      # =========================
      # 安全同步（不破坏 workflow）
      # =========================
      - name: Sync upstream safely
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git checkout upstream/main -- .

          git add .
          git commit -m "sync upstream" || true
          git push origin main || true


      # =========================
      # 🔥 修复重点：正确 dev 计算
      # =========================
      - name: Generate version
        id: version
        run: |
          set -e

          CURRENT_SHA=$(git rev-parse HEAD)

          RELEASE_TAG=$(git describe --tags --abbrev=0)
          RELEASE_SHA=$(git rev-list -n 1 "$RELEASE_TAG")

          echo "RELEASE_TAG=$RELEASE_TAG"
          echo "RELEASE_SHA=$RELEASE_SHA"
          echo "CURRENT_SHA=$CURRENT_SHA"

          MAJOR=$(echo "$RELEASE_TAG" | cut -d. -f1)
          MINOR=$(echo "$RELEASE_TAG" | cut -d. -f2)
          PATCH=$(echo "$RELEASE_TAG" | cut -d. -f3)

          if [ "$CURRENT_SHA" = "$RELEASE_SHA" ]; then

            # =========================
            # beta（稳定）
            # =========================
            VERSION="${RELEASE_TAG}-beta"
            MODE="beta"

          else

            # =========================
            # dev（关键修复：+1 version）
            # =========================
            NEXT_PATCH=$((PATCH + 1))

            SHORT_SHA=$(echo "$CURRENT_SHA" | cut -c1-7)

            VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev-${SHORT_SHA}"
            MODE="dev"

          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT


      # =========================
      # build summary
      # =========================
      - name: Build summary
        run: |
          echo "## 🐳 Build Result" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: ${{ steps.version.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY


      # =========================
      # Docker build
      # =========================
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false

          tags: |
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:dev


      # =========================
      # latest 只绑定 beta
      # =========================
      - name: Update latest (ONLY beta)
        if: steps.version.outputs.mode == 'beta'
        run: |
          docker buildx imagetools create \
            ghcr.io/${{ github.repository_owner }}/litepan-unofficial:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/litepan-unofficial:latest
