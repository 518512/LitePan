name: Daily Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建（忽略 upstream 更新）"
        type: boolean
        required: false
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:

# =========================
# JOB 1: check upstream
# =========================
  check:
    runs-on: ubuntu-latest

    outputs:
      updated: ${{ steps.check.outputs.updated }}
      force: ${{ github.event.inputs.force_build }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Ponphil/LitePan.git || true
          git fetch upstream main --tags

      - name: Check upstream
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "BEHIND=$BEHIND"

          if [ "$BEHIND" -eq 0 ]; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## 🔍 Upstream Check" >> $GITHUB_STEP_SUMMARY
          echo "- Behind: $(git rev-list --count HEAD..upstream/main)" >> $GITHUB_STEP_SUMMARY
          echo "- Force: ${{ github.event.inputs.force_build }}" >> $GITHUB_STEP_SUMMARY


# =========================
# JOB 2: build
# =========================
  build:
    needs: check
    if: needs.check.outputs.updated == 'true' || needs.check.outputs.force == 'true'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup upstream
        run: |
          git remote get-url upstream >/dev/null 2>&1 || \
          git remote add upstream https://github.com/Ponphil/LitePan.git
          git fetch upstream main --tags

      # =========================
      # 同步 upstream
      # =========================
      - name: Sync upstream
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git fetch upstream main --tags

          # ✅ 只同步 upstream 代码内容（不会影响 .github/workflows）
          git checkout upstream/main -- .

          # ✅ 提交变更（如果有）
          git add .
          git commit -m "sync upstream" || true

          # ❗关键：不要 force push
          git push origin main

      # =========================
      # 版本逻辑（beta / dev）
      # =========================
      - name: Generate version
        id: version
        run: |
          set -e

          CURRENT_SHA=$(git rev-parse HEAD)
          LATEST_TAG=$(git describe --tags --abbrev=0)
          RELEASE_SHA=$(git rev-list -n 1 "$LATEST_TAG")

          echo "LATEST_TAG=$LATEST_TAG"
          echo "RELEASE_SHA=$RELEASE_SHA"
          echo "CURRENT_SHA=$CURRENT_SHA"

          if [ "$CURRENT_SHA" = "$RELEASE_SHA" ]; then

            # =========================
            # beta（稳定）
            # =========================
            VERSION="${LATEST_TAG}-beta"
            MODE="beta"

          else

            # =========================
            # dev（开发）
            # =========================
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)

            PATCH=$((PATCH + 1))
            SHORT_SHA=$(echo "$CURRENT_SHA" | cut -c1-7)

            VERSION="${MAJOR}.${MINOR}.${PATCH}-dev-${SHORT_SHA}"
            MODE="dev"

          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      # =========================
      # build summary
      # =========================
      - name: Build summary
        run: |
          echo "## 🐳 Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: ${{ steps.version.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

      # =========================
      # docker build
      # =========================
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false

          # ❗关键修复：不再直接打 latest
          tags: |
            ghcr.io/518512/litepan-unofficial:${{ steps.version.outputs.version }}
            ghcr.io/518512/litepan-unofficial:dev

      # =========================
      # ⭐ 关键修复：latest 只跟 beta
      # =========================
      - name: Update latest tag (ONLY beta)
        if: steps.version.outputs.mode == 'beta'
        run: |
          docker buildx imagetools create \
            ghcr.io/518512/litepan-unofficial:${{ steps.version.outputs.version }} \
            --tag ghcr.io/518512/litepan-unofficial:latest

      # =========================
      # cleanup
      # =========================
      - name: Cleanup GHCR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const packageName = "litepan-unofficial";

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: "container",
                package_name: packageName,
                username: owner,
                per_page: 100
              }
            );

            for (const v of versions) {
              const tags = v.metadata?.container?.tags || [];

              if (!tags || tags.length === 0) {
                console.log("delete untagged:", v.id);

                await github.rest.packages.deletePackageVersionForUser({
                  package_type: "container",
                  package_name: packageName,
                  username: owner,
                  package_version_id: v.id
                });
              }
            }
