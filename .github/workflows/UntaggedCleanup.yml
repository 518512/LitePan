name: GHCR Untagged Cleanup (Report Mode)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "是否只模拟不删除（true=安全模式 / false=执行删除）"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 基础信息
      # =========================
      - name: Start cleanup
        run: |
          echo "========================================"
          echo "🧹 GHCR 清理任务启动"
          echo "Dry Run: ${{ github.event.inputs.dry_run }}"
          echo "========================================"

      # =========================
      # 核心清理脚本
      # =========================
      - name: Cleanup untagged images (with report)
        uses: actions/github-script@v8
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const dryRun = (process.env.DRY_RUN || "true") === "true";

            const owner = context.repo.owner;
            const packageName = "litepan-unofficial";

            console.log("Owner:", owner);
            console.log("Package:", packageName);
            console.log("DryRun:", dryRun);

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: "container",
                package_name: packageName,
                username: owner,
                per_page: 100
              }
            );

            console.log(`Total versions: ${versions.length}`);

            let deleted = 0;
            let skipped = 0;

            const report = [];

            for (const v of versions) {
              const tags = v.metadata?.container?.tags || [];

              // GHCR 页面链接
              const url = `https://github.com/users/${owner}/packages/container/${packageName}/${v.id}`;

              // digest（可能为空，做兜底）
              const digest =
                v.metadata?.container?.package_version_container_metadata?.tagged_object?.digest
                || v.name
                || "unknown";

              if (!tags || tags.length === 0) {

                const item = {
                  id: v.id,
                  url,
                  digest,
                  action: dryRun ? "DRY_RUN" : "DELETE"
                };

                report.push(item);

                console.log("========================================");
                console.log("🧨 UNTAGGED VERSION FOUND");
                console.log(`ID     : ${v.id}`);
                console.log(`DIGEST : ${digest}`);
                console.log(`URL    : ${url}`);
                console.log(`ACTION : ${dryRun ? "DRY RUN" : "DELETE"}`);
                console.log("========================================");

                if (dryRun) {
                  skipped++;
                } else {
                  await github.rest.packages.deletePackageVersionForUser({
                    package_type: "container",
                    package_name: packageName,
                    username: owner,
                    package_version_id: v.id
                  });
                  deleted++;
                }
              }
            }

            // =========================
            // 输出 JSON 报告（可调试）
            // =========================
            console.log("========== CLEANUP REPORT ==========");
            console.log(JSON.stringify(report, null, 2));
            console.log("Deleted:", deleted);
            console.log("Skipped:", skipped);

            // 写入 GitHub Step Summary（重点）
            core.summary
              .addHeading("🧹 GHCR Cleanup Report")
              .addText(`Dry Run: ${dryRun}`)
              .addBreak()
              .addText(`Total Versions: ${versions.length}`)
              .addBreak()
              .addText(`Deleted: ${deleted}`)
              .addBreak()
              .addText(`Skipped: ${skipped}`)
              .addBreak()
              .addSeparator()
              .addHeading("📦 Untagged Items");

            for (const item of report) {
              core.summary.addRaw(
                `- [${item.id}](${item.url})  \n  \`${item.digest}\`  \n  ${item.action}\n`
              );
            }

            await core.summary.write();
