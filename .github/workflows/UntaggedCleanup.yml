name: GHCR Untagged Cleanup (Stable)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true=只模拟 / false=执行删除"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:

      - name: Cleanup GHCR
        uses: actions/github-script@v8
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const dryRun = (process.env.DRY_RUN || "true") === "true";

            const owner = context.repo.owner;
            const packageName = "litepan-unofficial";

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: "container",
                package_name: packageName,
                username: owner,
                per_page: 100
              }
            );

            let deleted = 0;
            let skipped = 0;

            const report = [];

            for (const v of versions) {
              const tags = v.metadata?.container?.tags || [];

              const url = `https://github.com/users/${owner}/packages/container/${packageName}/${v.id}`;

              const digest =
                v.metadata?.container?.package_version_container_metadata?.tagged_object?.digest
                || "unknown";

              if (!tags || tags.length === 0) {

                report.push({
                  id: v.id,
                  url,
                  digest,
                  action: dryRun ? "DRY_RUN" : "DELETE"
                });

                if (dryRun) skipped++;
                else {
                  await github.rest.packages.deletePackageVersionForUser({
                    package_type: "container",
                    package_name: packageName,
                    username: owner,
                    package_version_id: v.id
                  });
                  deleted++;
                }
              }
            }

            // =========================
            // SAFE SUMMARY（不会炸 YAML）
            // =========================
            const summary = core.summary;

            summary.addHeading("🧹 GHCR Cleanup Report");

            summary.addRaw(`Mode: ${dryRun ? "DRY RUN" : "DELETE"}\n`);
            summary.addRaw(`Total: ${versions.length}\n`);
            summary.addRaw(`Deleted: ${deleted}\n`);
            summary.addRaw(`Skipped: ${skipped}\n`);

            summary.addRaw("\n---\n");
            summary.addRaw("## Untagged Versions\n\n");

            if (report.length === 0) {
              summary.addRaw("🎉 No untagged images\n");
            } else {

              summary.addRaw("| ID | Digest | Action |\n");
              summary.addRaw("|---|---|---|\n");

              for (const item of report) {
                summary.addRaw(
                  `| [${item.id}](${item.url}) | ${item.digest} | ${item.action} |\n`
                );
              }
            }

            await summary.write();
